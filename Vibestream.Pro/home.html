<!DOCTYPE html>
<html>
<head>
<title>Spotify UI</title>
<link rel="stylesheet" href="Home.css">
</head>
<body>

<div class="topbar">
    <div class="left-top">
        <img src="Spotify.webp" class="top-icon">

        <a href="Home.html" class="home-logo">
            <img src="Home.png" alt="Home Logo">
        </a>

        <input type="text" placeholder="What do you want to play?">
    </div>

    <div class="right-top">
        <a href="Music Gallery.html" class="music-link">Music Gallery</a>
        <img src="List.png" class="top-icon">
    </div>
</div>

<div class="container">

    <div class="sidebar">
        <h2>Welcome to <span>Spotify</span></h2>

        <p class="small">New to Spotify?</p>
        <a href="Log in HTML.html"><button>Sign Up</button></a>

        <p class="small">Already had account?</p>
        <a href="Log in HTML.html"><button>Log In</button></a>

        <div class="bottom-links">
            <a href="Contact Us.html">Contact Us</a>
            <a href="About Us.html">About Us</a>
        </div>
    </div>

    <div class="content">
        <h1>What’s on your mind?</h1>

        <div class="grid">

            <div class="card">
                <img src="Taylor Swift.webp">
                <p>The Life of a Showgirl</p>
            </div>

            <div class="card">
                <img src="Bruno Mars.png">
                <p>24k Magic</p>
            </div>

            <div class="card">
                <img src="Katy Perry.webp">
                <p>One of the Boys</p>
            </div>

            <div class="card">
                <img src="Freudian.jpg">
                <p>Freudian</p>
            </div>

            <div class="card">
                <img src="Twice.webp">
                <p>Likey</p>
            </div>

            <div class="card">
                <img src="Katseye.webp">
                <p>Internet Girl</p>
            </div>

            <div class="card">
                <img src="Talaraawan.png">
                <p>Talaarawan</p>
            </div>

            <div class="card">
                <img src="Sza.webp">
                <p>SOS</p>
            </div>

        </div>
    </div>

</div>

</body>
</html>
