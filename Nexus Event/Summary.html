<!DOCTYPE html>
<html>
<head>
<title>Summary</title>
<link rel="stylesheet" href="summary.css">
</head>
<body>

<div class="glass fade">
<h2>Summary</h2>

<div class="info-row"><span>Artist</span><span id="artist"></span></div>
<div class="info-row"><span>Ticket</span><span id="ticket"></span></div>

<div id="attendee-list"></div>

<hr style="border: none; border-top: 1px solid rgba(255, 255, 255, 0.2); margin: 20px 0;">
<div class="info-row"><span>Total Cost</span><span id="total-cost"></span></div>

<h3>Please provide an email</h3>
<input type="email" id="email" required>

<button onclick="nextPage()" class="btn">Next</button>

</div>

<script>
document.getElementById("artist").innerText = localStorage.getItem("artist");
document.getElementById("ticket").innerText = localStorage.getItem("ticket");

const attendees = JSON.parse(localStorage.getItem("attendees") || "[]");
const listContainer = document.getElementById("attendee-list");

attendees.forEach((person, index) => {
    listContainer.innerHTML += `
        <div class="info-row"><span>Attendee ${index + 1}</span><span>${person.name} (${person.type})</span></div>
    `;
});

const ticketString = localStorage.getItem("ticket");
const quantity = parseInt(localStorage.getItem("attendeeQuantity") || "1");

const priceMatch = ticketString.match(/₱([\d,]+)/);
let ticketPrice = 0;
if (priceMatch && priceMatch[1]) {
    ticketPrice = parseInt(priceMatch[1].replace(/,/g, ''));
}

const totalCost = ticketPrice * quantity;
document.getElementById("total-cost").innerText = `₱${totalCost.toLocaleString()}`;

function nextPage(){
    const emailInput = document.getElementById("email");
    if (!emailInput.value || !emailInput.checkValidity()) {
        alert("Please enter a valid email address.");
        return;
    }
    localStorage.setItem("email", emailInput.value);
    window.location = "qr.html";
}
</script>

</body>
</html>
